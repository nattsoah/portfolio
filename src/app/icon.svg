<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
  <defs>
    <!-- Premium Tech Gradient: Neon Cyan to Electric Purple -->
    <linearGradient id="nsGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00F0FF;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#007BFF;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#5D00FF;stop-opacity:1"/>
    </linearGradient>
    
    <!-- Upgraded Neon Glow Filter for a super vibrant 3D look -->
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur in="SourceGraphic" stdDeviation="15" result="blur1" />
        <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur2" />
        <feMerge>
            <feMergeNode in="blur1" />
            <feMergeNode in="blur2" />
            <feMergeNode in="SourceGraphic" />
        </feMerge>
    </filter>
  </defs>

  <!-- 
    Stylized "N" - Neon Circuit Design
    Perfect square aspect ratio for favicons and profile pictures.
  -->
  <g filter="url(#neonGlow)">
    <!-- Outer thick glowing track -->
    <path d="M 140 400 L 140 100 L 360 400 L 360 100" 
          stroke="url(#nsGradient)" 
          stroke-width="70" 
          fill="none" 
          stroke-linecap="round" 
          stroke-linejoin="round" 
          opacity="0.9"/>
          
    <!-- Inner bright energy core line -->
    <path d="M 140 400 L 140 100 L 360 400 L 360 100" 
          stroke="#E0FFFF" 
          stroke-width="12" 
          fill="none" 
          stroke-linecap="round" 
          stroke-linejoin="round"/>
          
    <!-- Tech connection nodes at the ends -->
    <circle cx="140" cy="400" r="18" fill="#FFFFFF"/>
    <circle cx="360" cy="100" r="18" fill="#FFFFFF"/>
  </g>
</svg>