<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 250">
  <defs>
    <linearGradient id="nsGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00FFFF;stop-opacity:1"/> <stop offset="100%" style="stop-color:#007BFF;stop-opacity:1"/> </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#00FFFF" flood-opacity="0.3"/>
    </filter>
  </defs>

  <g filter="url(#glow)">
    <path d="M 120 180 
             L 120 70 
             L 230 180 
             L 230 70 
             C 230 70, 350 70, 350 125 
             L 230 125 
             C 230 125, 120 125, 120 180"
          stroke="url(#nsGradient)"
          stroke-width="20"
          fill="none"
          stroke-linecap="round"
          stroke-linejoin="round"/>
  </g>
</svg>