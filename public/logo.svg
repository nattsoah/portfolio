<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
  <defs>
    <!-- Holographic Tech Gradients -->
    <linearGradient id="glowViolet" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7F56FF" />
      <stop offset="100%" stop-color="#FF3399" />
    </linearGradient>
    <linearGradient id="glowCyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00E5FF" />
      <stop offset="100%" stop-color="#7F56FF" />
    </linearGradient>
    
    <!-- Neon Blur Filter -->
    <filter id="hologramGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="15" result="blur1" />
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur2" />
      <feMerge>
        <feMergeNode in="blur1" />
        <feMergeNode in="blur2" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Outer Tech Guide Hexagon -->
  <polygon points="250,55 419,152 419,348 250,445 81,348 81,152" 
           fill="none" 
           stroke="url(#glowCyan)" 
           stroke-width="2.5" 
           opacity="0.2" 
           stroke-dasharray="12 18" />
  
  <!-- Subtle Ambient Glow Orb -->
  <circle cx="250" cy="250" r="140" fill="url(#glowViolet)" opacity="0.12" filter="blur(30px)" />
  
  <!-- Interactive Monogram Structure -->
  <g filter="url(#hologramGlow)">
    <!-- Left Ribbon Pillar -->
    <path d="M 175 360 L 175 140" 
          stroke="url(#glowCyan)" 
          stroke-width="48" 
          stroke-linecap="round" 
          fill="none" />
          
    <!-- Diagonal Connecting Fold -->
    <path d="M 175 140 C 235 200, 265 300, 325 360" 
          stroke="url(#glowViolet)" 
          stroke-width="48" 
          stroke-linecap="round" 
          fill="none" />
          
    <!-- Right Ribbon Pillar -->
    <path d="M 325 360 L 325 140" 
          stroke="url(#glowCyan)" 
          stroke-width="48" 
          stroke-linecap="round" 
          fill="none" />
          
    <!-- Bright Core Reflection Details -->
    <path d="M 175 330 L 175 170" 
          stroke="#E0FFFF" 
          stroke-width="8" 
          stroke-linecap="round" 
          opacity="0.8" 
          fill="none" />
    <path d="M 325 330 L 325 170" 
          stroke="#E0FFFF" 
          stroke-width="8" 
          stroke-linecap="round" 
          opacity="0.8" 
          fill="none" />
          
    <!-- Active Energy Junctions -->
    <circle cx="175" cy="140" r="12" fill="#FFFFFF" />
    <circle cx="325" cy="360" r="12" fill="#FFFFFF" />
  </g>
</svg>